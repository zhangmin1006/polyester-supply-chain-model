services:
  - type: web
    name: polyester-supply-chain-model
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir model/webapp server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
